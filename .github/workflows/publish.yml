# .github/workflows/publish.yml
name: Publish to PyPI

on:
  release:
    types: [published]  # Запуск при публикации релиза на GitHub
  # Альтернатива: по тегу
  # push:
  #   tags: ['v*']

  # Для тестирования: запуск вручную
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Окружение для защиты (опционально, но рекомендуется)
    environment:
      name: pypi
      url: https://pypi.org/project/aiomax-python/
    
    permissions:
      id-token: write  # 🔐 Обязательно для OIDC-аутентификации
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Для корректного определения версии

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      # 🔐 Публикация через OIDC (самый безопасный способ — без токена!)
      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Для публикации на TestPyPI раскомментируйте:
          # repository-url: https://test.pypi.org/legacy/